<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro de Clientes</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- TELA DE AUTENTICAÇÃO (LOGIN) -->
    <div id="auth-screen" class="screen active">
        <div class="auth-card">
            <h2>Login - Sistema de Clientes</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" required placeholder="Sua senha">
                </div>
                <button type="submit" class="btn btn-primary">Entrar</button>
            </form>
            <p id="auth-error" class="error-message"></p>
        </div>
    </div>

    <!-- TELA PRINCIPAL DO SISTEMA (PROTEGIDA) -->
    <div id="app-screen" class="screen">
        <header class="app-header">
            <h1>Gestão de Clientes</h1>
            <button id="logout-btn" class="btn btn-danger">Sair</button>
        </header>

        <main class="app-main">
            <!-- FORMULÁRIO DE CADASTRO / EDIÇÃO -->
            <section class="card form-section">
                <h2>Cadastro de Cliente</h2>
                <form id="client-form">
                    <input type="hidden" id="client-id">

                    <!-- Seção de Foto (Obrigatória) -->
                    <div class="photo-container">
                        <div class="photo-preview">
                            <!-- Removido o placeholder externo para evitar dependência de rede, usamos um padrão vazio ou local -->
                            <img id="preview-img" src="" alt="Foto Obrigatória do Cliente">
                        </div>
                        <div class="photo-controls">
                            <input type="file" id="upload-file" accept="image/*">
                            <button type="button" id="btn-webcam" class="btn btn-secondary">Usar Webcam</button>
                        </div>
                    </div>
                    <p id="photo-error" class="error-message" style="color: red; display: none;">A foto do cliente é obrigatória para o cadastro!</p>

                    <!-- Modal/Área da Webcam (Oculta por padrão) -->
                    <div id="webcam-container" class="hidden">
                        <video id="webcam-video" autoplay playsinline></video>
                        <button type="button" id="btn-capture" class="btn btn-primary">Tirar Foto</button>
                        <canvas id="webcam-canvas" class="hidden"></canvas>
                    </div>

                    <!-- Dados Pessoais -->
                    <div class="form-row">
                        <div class="form-group flex-2">
                            <label for="client-name">Nome Completo</label>
                            <input type="text" id="client-name" required placeholder="Nome completo do cliente">
                        </div>
                        <div class="form-group flex-1">
                            <label for="client-email">E-mail</label>
                            <input type="email" id="client-email" required placeholder="email@exemplo.com">
                        </div>
                    </div>

                    <!-- Seleção de Documento -->
                    <div class="form-group">
                        <label>Tipo de Documento</label>
                        <div class="doc-type-buttons">
                            <button type="button" class="btn-doc active" data-type="CPF">CPF</button>
                            <button type="button" class="btn-doc" data-type="RG">RG</button>
                            <button type="button" class="btn-doc" data-type="CNH">CNH</button>
                        </div>
                        <input type="text" id="client-document" required placeholder="Digite o documento conforme o tipo selecionado">
                    </div>

                    <!-- Endereço via ViaCEP -->
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label for="client-cep">CEP</label>
                            <input type="text" id="client-cep" maxlength="9" required placeholder="00000-000">
                        </div>
                        <div class="form-group flex-3">
                            <label for="client-street">Rua / Avenida</label>
                            <input type="text" id="client-street" required placeholder="Logradouro">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label for="client-number">Número</label>
                            <input type="text" id="client-number" required placeholder="Nº">
                        </div>
                        <div class="form-group flex-2">
                            <label for="client-complement">Complemento</label>
                            <input type="text" id="client-complement" placeholder="Apto, Bloco, etc.">
                        </div>
                        <div class="form-group flex-2">
                            <label for="client-neighborhood">Bairro</label>
                            <input type="text" id="client-neighborhood" required placeholder="Bairro">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group flex-2">
                            <label for="client-city">Cidade</label>
                            <input type="text" id="client-city" required placeholder="Cidade">
                        </div>
                        <div class="form-group flex-1">
                            <label for="client-uf">UF</label>
                            <input type="text" id="client-uf" maxlength="2" required placeholder="UF">
                        </div>
                    </div>

                    <!-- Botões de Ação do CRUD -->
                    <div class="form-actions">
                        <button type="submit" id="btn-save" class="btn btn-success">Cadastrar</button>
                        <button type="button" id="btn-update" class="btn btn-warning" disabled>Alterar</button>
                        <button type="button" id="btn-delete" class="btn btn-danger" disabled>Deletar</button>
                        <button type="button" id="btn-clear" class="btn btn-secondary">Limpar</button>
                    </div>
                </form>
            </section>

            <!-- SEÇÃO DE RELATÓRIOS E CONSULTA -->
            <section class="card reports-section">
                <h2>Consulta e Relatórios</h2>
                <div class="report-filters">
                    <div class="form-group">
                        <input type="text" id="filter-city" placeholder="Filtrar por Cidade">
                        <button type="button" id="btn-print-city" class="btn btn-info">Imprimir por Cidade</button>
                    </div>
                    <div class="form-group">
                        <input type="text" id="filter-uf" maxlength="2" placeholder="Filtrar por UF">
                        <button type="button" id="btn-print-uf" class="btn btn-info">Imprimir por UF</button>
                    </div>
                    <div class="global-print-controls">
                        <button type="button" id="btn-print-all" class="btn btn-primary">Imprimir Todos</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table id="clients-table">
                        <thead>
                            <tr>
                                <th>Foto</th>
                                <th>Nome</th>
                                <th>Documento</th>
                                <th>E-mail</th>
                                <th>Cidade/UF</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="clients-table-body">
                            <!-- Dados inseridos via JavaScript -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
